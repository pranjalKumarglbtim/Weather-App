<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Skycast - Sign In</title><link rel="stylesheet" href="css/style.css"/><style>.auth-container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.auth-card{background:var(--surface);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--radius-2xl);padding:48px;width:100%;max-width:400px;box-shadow:var(--shadow-premium)}.auth-title{font-size:32px;font-weight:700;margin-bottom:24px}.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}.form-label{font-size:12px;text-transform:uppercase;color:var(--text-muted)}.form-input{padding:14px 16px;background:var(--surface-strong);border:1.5px solid var(--border);border-radius:12px;font-size:15px;color:var(--text)}.form-input.error{border-color:var(--danger)}.form-error{font-size:11px;color:var(--danger);min-height:16px}.auth-btn{width:100%;padding:14px 24px;background:linear-gradient(135deg,var(--accent),var(--accent-2));border:none;border-radius:12px;color:white;font-weight:600;cursor:pointer;margin-top:8px}.auth-link{color:var(--accent-2);cursor:pointer;font-weight:600}.auth-link:hover{text-decoration:underline}</style></head><body data-theme="dark"><div class="auth-container"><div class="auth-card glass"><h1 class="auth-title">Welcome to Skycast</h1><form class="auth-form" id="authForm"><div class="form-group"><label class="form-label" for="email">Email</label><input class="form-input" type="email" id="email" required/><div class="form-error" id="emailError"></div></div><div class="form-group"><label class="form-label" for="password">Password</label><input class="form-input" type="password" id="password" required minlength="6"/><div class="form-error" id="passwordError"></div></div><button class="auth-btn" type="submit">Sign In</button></form><div class="auth-footer"><span>New user? </span><span class="auth-link" id="showSignup">Create account</span></div></div></div><script>if(localStorage.getItem("skycast:auth")==="true")window.location.href="/";const form=document.getElementById("authForm"),email=document.getElementById("email"),password=document.getElementById("password"),emailErr=document.getElementById("emailError"),passErr=document.getElementById("passwordError");form.addEventListener("submit",e=>{e.preventDefault();let err=false;if(!email.value||!/^\S+@\S+\.\S+$/.test(email.value)){emailErr.textContent="Enter valid email";email.classList.add("error");err=true}else{emailErr.textContent="";email.classList.remove("error")}if(!password.value||password.value.length<6){passErr.textContent="Min 6 characters";password.classList.add("error");err=true}else{passErr.textContent="";password.classList.remove("error")}if(!err){localStorage.setItem("skycast:auth","true");localStorage.setItem("skycast:user",JSON.stringify({email:email.value}));window.location.href="/"} });document.getElementById("showSignup").addEventListener("click",()=>{const em=prompt("Email:");const pw=prompt("Password (min 6):");if(em&&pw&&pw.length>=6){localStorage.setItem("skycast:auth","true");window.location.href="/"}else if(pw&&pw.length<6)alert("Password must be 6+ chars");});</script></body></html>
